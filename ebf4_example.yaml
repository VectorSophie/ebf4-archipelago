# Epic Battle Fantasy 4 — Archipelago settings.
# Rename the file to your own name and drop it in the host's Players/ folder
# before generating. Casual? Just set `name`, pick a `preset`, and you're done —
# every other option has a sensible default (shown commented below).

name: Player1
description: EBF4
game: Epic Battle Fantasy 4

Epic Battle Fantasy 4:
  # ---- the only two knobs most people touch ----

  # order = the curated, structured completionist run (recommended).
  # chaos = a trap gauntlet: short % goal, lots of traps, DeathLink, harder.
  # custom = leave every option below at its own value.
  preset: order

  # How you win. godcat = beat the final boss. boss_hunt = beat N bosses.
  # check_percent = check a % of all locations.
  goal: godcat

  # ---- everything below is optional; defaults shown ----

  # boss_hunt_count: 10        # bosses to beat when goal = boss_hunt
  # check_percentage: 100      # % of locations when goal = check_percent

  # randomize_tools: true      # shuffle axe/candle/hammer/boots/ladder into the
  #                            # multiworld (region logic keeps every seed
  #                            # beatable). Off = tools stay in vanilla chests.
  # randomize_bosses: true     # beating a scripted battle/boss is a check
  # randomize_medals: true     # earning an in-game medal is a check
  # randomize_bestiary: true   # first defeat of each foe type is a check

  # starting_tools: 0          # begin with this many random tools (0..7)

  # party_shuffle: false       # shuffle your party into the multiworld: start
  #                            # solo as Anna and receive Matt/Natalie/Lance as
  #                            # items. They're guaranteed before the final boss,
  #                            # but you fight understaffed until they arrive.

  # difficulty: normal         # easy | normal | hard | epic

  # trap_percentage: 10        # % of filler items replaced by traps (0..40)
  # trap_types: [poison, goldloss, encounter, statdown]

  # energy_link: false         # share gold with other EnergyLink players via a
  #                            # common pool (client: /deposit, /withdraw, /energy)

  # in_game_messages: true     # on-screen banner for sends/receives/tools/goal

  # death_link: false          # a party wipe sends a death; incoming deaths
  #                            # wipe your party
